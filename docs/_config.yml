# _config.yml — Jekyll site settings
# For technical reasons, this file is NOT reloaded automatically when using
# 'bundle exec jekyll serve'. Restart the server after changes.

title: Toronto Mega Empires
email: info@torontomegaempires.com

copyright: "Copyright (c) {currentYear} Rob McArthur"

description: >- # this means to ignore newlines until "baseurl:"
  Toronto Mega Empires is a Toronto group dedicated to promoting
  and playing Mega Empires.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.torontomegaempires.com" # the base hostname & protocol for your site, e.g. http://example.com

# Social links
social_links:
  discord: "https://discord.torontomegaempires.com"
  email: "mailto:info@torontomegaempires.com"

# Custom collections for different content types
collections:
  game_reports:
    output: true
    permalink: /:collection/:name/

# Better defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Rob of the North"
  - scope:
      path: ""
      type: "game_reports"
    values:
      layout: "game_report"
      
# Build settings
# highlighter: none
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  parse_span_html: true
  html_to_native: true
  
# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship
  - jekyll_sqlite # see https://github.com/captn3m0/jekyll-sqlite
  - jekyll-datapage-generator

author: Rob of the North

# Control which pages appear in the site header nav
header_pages:
  - about.markdown
  - games.md
  - stats.md

sqlite:
  - data: players
    file: &db "_db/megaempires.db"
    query: SELECT * from player
  - data: games
    file: *db
    query: "select * from game order by date(date) desc"
  - data: game_players
    file: *db
    query: "select 
	game_player_nation.game_id,
	player.display as player, 
	nation.name as nation,
	game_player_nation.cities,
	game_player_nation.ast_pos,
	game_player_nation.score
from player
  join game_player_nation on 
	player.id=game_player_nation.player_id
  join nation on
    nation.id=game_player_nation.nation_id
order by game_player_nation.game_id, score desc"
  - data: player_stats
    file: *db
    query: "SELECT
      p.display as player,
      COUNT(*) as games_played,
      SUM(CASE WHEN gpn.score = (SELECT MAX(gpn2.score) FROM game_player_nation gpn2 WHERE gpn2.game_id = gpn.game_id) THEN 1 ELSE 0 END) as wins,
      ROUND(AVG(gpn.score), 1) as avg_score,
      MAX(gpn.score) as max_score
    FROM player p
    JOIN game_player_nation gpn ON p.id = gpn.player_id
    GROUP BY p.id
    ORDER BY wins DESC, avg_score DESC"
  - data: nation_stats
    file: *db
    query: "SELECT
      n.name as nation,
      COUNT(*) as times_played,
      SUM(CASE WHEN gpn.score = (SELECT MAX(gpn2.score) FROM game_player_nation gpn2 WHERE gpn2.game_id = gpn.game_id) THEN 1 ELSE 0 END) as wins,
      ROUND(AVG(gpn.score), 1) as avg_score,
      MAX(gpn.score) as max_score
    FROM nation n
    JOIN game_player_nation gpn ON n.id = gpn.nation_id
    GROUP BY n.id
    ORDER BY wins DESC, avg_score DESC"
  - data: game_winners
    file: *db
    query: "SELECT
      g.id as game_id,
      g.name as game_name,
      g.date as game_date,
      p.display as winner,
      n.name as nation,
      gpn.score
    FROM game g
    JOIN game_player_nation gpn ON g.id = gpn.game_id
    JOIN player p ON p.id = gpn.player_id
    JOIN nation n ON n.id = gpn.nation_id
    WHERE gpn.score = (SELECT MAX(gpn2.score) FROM game_player_nation gpn2 WHERE gpn2.game_id = g.id)
    ORDER BY date(g.date) DESC"

exclude:
  - _db
