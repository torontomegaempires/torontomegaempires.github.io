# _config.yml — Jekyll site settings
# For technical reasons, this file is NOT reloaded automatically when using
# 'bundle exec jekyll serve'. Restart the server after changes.

title: Toronto Mega Empires
email: info@torontomegaempires.com

copyright: "Copyright (c) {currentYear} Rob McArthur"

description: >- # this means to ignore newlines until "baseurl:"
  Toronto Mega Empires is a Toronto group dedicated to promoting
  and playing Mega Empires.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.torontomegaempires.com" # the base hostname & protocol for your site, e.g. http://example.com

# Social links
social_links:
  discord: "https://discord.torontomegaempires.com"
  email: "mailto:info@torontomegaempires.com"

# Custom collections for different content types
collections:
  game_reports:
    output: true
    permalink: /:collection/:name/

# Better defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Rob of the North"
  - scope:
      path: ""
      type: "game_reports"
    values:
      layout: "game_report"
      
# Build settings
# highlighter: none
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true
  parse_span_html: true
  html_to_native: true
  
# Build settings
theme: minima

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-spaceship
  - jekyll_sqlite # see https://github.com/captn3m0/jekyll-sqlite
  - jekyll-datapage-generator

author: Rob of the North

# Control which pages appear in the site header nav
header_pages:
  - about.markdown
  - games.md
  - stats.md

sqlite:
  - data: players
    file: &db "_db/megaempires.db"
    query: SELECT * from player
  - data: games
    file: *db
    query: "select * from game order by date(date) desc"
  - data: game_players
    file: *db
    query: "select
	game_player_nation.game_id,
	player.display as player,
	nation.name as nation,
	game_player_nation.cities,
	game_player_nation.ast_pos,
	game_player_nation.score,
	game_player_nation.num_civ_adv_1VP,
	game_player_nation.num_civ_adv_3VP,
	game_player_nation.num_civ_adv_6VP,
	game_player_nation.special_building,
	game_player_nation.special_building_own,
	game_player_nation.special_building_control,
	ROW_NUMBER() OVER (PARTITION BY game_player_nation.game_id ORDER BY game_player_nation.score DESC, (CASE WHEN game_player_nation.special_building = 1 AND game_player_nation.special_building_own = 1 AND game_player_nation.special_building_control >= 1 THEN 1 ELSE 0 END) DESC, game_player_nation.special_building DESC, game_player_nation.ast_pos DESC, game_player_nation.num_civ_adv_6VP DESC, game_player_nation.num_civ_adv_3VP DESC) as rank
from player
  join game_player_nation on
	player.id=game_player_nation.player_id
  join nation on
    nation.id=game_player_nation.nation_id
order by game_player_nation.game_id, game_player_nation.score DESC, (CASE WHEN game_player_nation.special_building = 1 AND game_player_nation.special_building_own = 1 AND game_player_nation.special_building_control >= 1 THEN 1 ELSE 0 END) DESC, game_player_nation.special_building DESC, game_player_nation.ast_pos DESC, game_player_nation.num_civ_adv_6VP DESC, game_player_nation.num_civ_adv_3VP DESC"
  - data: player_stats
    file: *db
    query: "WITH game_top_third AS (
      SELECT game_id, player_id,
        ROW_NUMBER() OVER (PARTITION BY game_id ORDER BY score DESC, (CASE WHEN special_building = 1 AND special_building_own = 1 AND special_building_control >= 1 THEN 1 ELSE 0 END) DESC, special_building DESC, ast_pos DESC, num_civ_adv_6VP DESC, num_civ_adv_3VP DESC) as rnk,
        COUNT(*) OVER (PARTITION BY game_id) as player_count
      FROM game_player_nation
    ),
    player_fav AS (
      SELECT player_id, name as fav_nation, play_count as fav_nation_count
      FROM (
        SELECT gpn.player_id, n.name, COUNT(*) as play_count,
          ROW_NUMBER() OVER (PARTITION BY gpn.player_id ORDER BY COUNT(*) DESC) as rn
        FROM game_player_nation gpn
        JOIN nation n ON n.id = gpn.nation_id
        GROUP BY gpn.player_id, gpn.nation_id
      ) WHERE rn = 1
    )
    SELECT
      p.display as player,
      COUNT(*) as games_played,
      SUM(CASE WHEN gpn.player_id = (SELECT gpn2.player_id FROM game_player_nation gpn2 WHERE gpn2.game_id = gpn.game_id ORDER BY gpn2.score DESC, (CASE WHEN gpn2.special_building = 1 AND gpn2.special_building_own = 1 AND gpn2.special_building_control >= 1 THEN 1 ELSE 0 END) DESC, gpn2.special_building DESC, gpn2.ast_pos DESC, gpn2.num_civ_adv_6VP DESC, gpn2.num_civ_adv_3VP DESC LIMIT 1) THEN 1 ELSE 0 END) as wins,
      SUM(CASE WHEN EXISTS (SELECT 1 FROM game_top_third gtt WHERE gtt.game_id = gpn.game_id AND gtt.player_id = gpn.player_id AND gtt.rnk <= gtt.player_count / 3) THEN 1 ELSE 0 END) as top3,
      CAST(ROUND(AVG(gpn.score)) AS INTEGER) as avg_score,
      MAX(gpn.score) as max_score,
      pf.fav_nation,
      pf.fav_nation_count
    FROM player p
    JOIN game_player_nation gpn ON p.id = gpn.player_id
    LEFT JOIN player_fav pf ON pf.player_id = p.id
    GROUP BY p.id
    HAVING games_played >= 2
    ORDER BY wins DESC, (top3 * 1.0 / games_played) DESC, avg_score DESC"
  - data: player_zscore
    file: *db
    query: "WITH game_stats AS (
      SELECT game_id,
        AVG(score) as avg_score,
        SQRT(AVG((score - (SELECT AVG(s.score) FROM game_player_nation s WHERE s.game_id = gpn.game_id)) *
                 (score - (SELECT AVG(s.score) FROM game_player_nation s WHERE s.game_id = gpn.game_id)))) as stddev_score
      FROM game_player_nation gpn
      GROUP BY game_id
    )
    SELECT
      p.display as player,
      COUNT(*) as games_played,
      SUM(CASE WHEN gpn.player_id = (SELECT gpn2.player_id FROM game_player_nation gpn2 WHERE gpn2.game_id = gpn.game_id ORDER BY gpn2.score DESC, (CASE WHEN gpn2.special_building = 1 AND gpn2.special_building_own = 1 AND gpn2.special_building_control >= 1 THEN 1 ELSE 0 END) DESC, gpn2.special_building DESC, gpn2.ast_pos DESC, gpn2.num_civ_adv_6VP DESC, gpn2.num_civ_adv_3VP DESC LIMIT 1) THEN 1 ELSE 0 END) as wins,
      ROUND(AVG((gpn.score - gs.avg_score) / gs.stddev_score), 2) as avg_z_score
    FROM player p
    JOIN game_player_nation gpn ON p.id = gpn.player_id
    JOIN game_stats gs ON gs.game_id = gpn.game_id
    GROUP BY p.id
    HAVING games_played >= 3
    ORDER BY avg_z_score DESC"
  - data: nation_stats
    file: *db
    query: "SELECT
      n.name as nation,
      COUNT(*) as times_played,
      SUM(CASE WHEN gpn.player_id = (SELECT gpn2.player_id FROM game_player_nation gpn2 WHERE gpn2.game_id = gpn.game_id ORDER BY gpn2.score DESC, (CASE WHEN gpn2.special_building = 1 AND gpn2.special_building_own = 1 AND gpn2.special_building_control >= 1 THEN 1 ELSE 0 END) DESC, gpn2.special_building DESC, gpn2.ast_pos DESC, gpn2.num_civ_adv_6VP DESC, gpn2.num_civ_adv_3VP DESC LIMIT 1) THEN 1 ELSE 0 END) as wins,
      CAST(ROUND(AVG(gpn.score)) AS INTEGER) as avg_score,
      MAX(gpn.score) as max_score
    FROM nation n
    JOIN game_player_nation gpn ON n.id = gpn.nation_id
    GROUP BY n.id
    ORDER BY wins DESC, avg_score DESC"
  - data: nation_game_scores
    file: *db
    query: "SELECT
      n.name as nation,
      g.name as game_name,
      g.date as game_date,
      gpn.score,
      gs.avg_score,
      gs.stddev,
      p.display as player,
      CASE WHEN gpn.player_id = (
        SELECT gpn2.player_id FROM game_player_nation gpn2
        WHERE gpn2.game_id = g.id
        ORDER BY gpn2.score DESC,
          (CASE WHEN gpn2.special_building = 1 AND gpn2.special_building_own = 1 AND gpn2.special_building_control >= 1 THEN 1 ELSE 0 END) DESC,
          gpn2.special_building DESC, gpn2.ast_pos DESC,
          gpn2.num_civ_adv_6VP DESC, gpn2.num_civ_adv_3VP DESC
        LIMIT 1
      ) THEN 1 ELSE 0 END as won
    FROM nation n
    JOIN game_player_nation gpn ON n.id = gpn.nation_id
    JOIN player p ON p.id = gpn.player_id
    JOIN game g ON gpn.game_id = g.id
    JOIN (
      SELECT game_id,
        ROUND(AVG(score), 1) as avg_score,
        ROUND(SQRT(AVG(score * score) - AVG(score) * AVG(score)), 1) as stddev
      FROM game_player_nation
      GROUP BY game_id
    ) gs ON gs.game_id = g.id
    ORDER BY n.name, date(g.date)"
  - data: game_winners
    file: *db
    query: "SELECT
      g.id as game_id,
      g.name as game_name,
      g.date as game_date,
      p.display as winner,
      n.name as nation,
      gpn.score,
      gs.avg_score,
      gs.median_score
    FROM game g
    JOIN game_player_nation gpn ON g.id = gpn.game_id
    JOIN player p ON p.id = gpn.player_id
    JOIN nation n ON n.id = gpn.nation_id
    JOIN (
      SELECT game_id,
        CAST(ROUND(AVG(score)) AS INTEGER) as avg_score,
        CAST(ROUND(AVG(CASE WHEN rn IN ((cnt+1)/2, (cnt+2)/2) THEN score END)) AS INTEGER) as median_score
      FROM (
        SELECT game_id, score,
          ROW_NUMBER() OVER (PARTITION BY game_id ORDER BY score) as rn,
          COUNT(*) OVER (PARTITION BY game_id) as cnt
        FROM game_player_nation
      )
      GROUP BY game_id
    ) gs ON gs.game_id = g.id
    WHERE gpn.player_id = (SELECT gpn2.player_id FROM game_player_nation gpn2 WHERE gpn2.game_id = g.id ORDER BY gpn2.score DESC, (CASE WHEN gpn2.special_building = 1 AND gpn2.special_building_own = 1 AND gpn2.special_building_control >= 1 THEN 1 ELSE 0 END) DESC, gpn2.special_building DESC, gpn2.ast_pos DESC, gpn2.num_civ_adv_6VP DESC, gpn2.num_civ_adv_3VP DESC LIMIT 1)
    ORDER BY date(g.date) DESC"

exclude:
  - _db
